<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>星虚对弈 — 多人在线对战</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="conn" id="conn">未连接</div>
<div class="notif-container" id="notif-container"></div>

<!-- Lobby -->
<div id="lobby">
  <div class="lobby-box">
    <h1>星虚对弈</h1>
    <div class="sub">多人在线对战</div>
    <div class="mode-select">
      <div class="mode-btn selected" data-mode="2" onclick="selectMode(2)" ontouchend="event.preventDefault();selectMode(2)"><span class="num">2</span><span class="label">人对战</span></div>
      <div class="mode-btn" data-mode="3" onclick="selectMode(3)" ontouchend="event.preventDefault();selectMode(3)"><span class="num">3</span><span class="label">人对战</span></div>
      <div class="mode-btn mode-ai" data-mode="ai" onclick="selectMode('ai')" ontouchend="event.preventDefault();selectMode('ai')"><span class="num">&#x1F916;</span><span class="label">人机对战</span></div>
    </div>
    <!-- AI difficulty selection -->
    <div id="ai-difficulty" style="display:none;margin-bottom:16px">
      <div style="font-size:11px;opacity:.4;margin-bottom:6px;letter-spacing:2px">选择难度</div>
      <div class="ai-diff-row">
        <div class="mode-btn ai-diff selected" data-diff="simple" onclick="selectAIDiff('simple')" ontouchend="event.preventDefault();selectAIDiff('simple')"><span class="num">&#9734;</span><span class="label">初学</span></div>
        <div class="mode-btn ai-diff" data-diff="medium" onclick="selectAIDiff('medium')" ontouchend="event.preventDefault();selectAIDiff('medium')"><span class="num">&#9733;</span><span class="label">进阶</span></div>
        <div class="mode-btn ai-diff" data-diff="hard" onclick="selectAIDiff('hard')" ontouchend="event.preventDefault();selectAIDiff('hard')"><span class="num">&#9876;</span><span class="label">宗师</span></div>
      </div>
    </div>
    <!-- Blood mode toggle -->
    <div id="blood-toggle" style="margin-bottom:16px">
      <div style="display:flex;gap:8px;justify-content:center">
        <div class="mode-btn ai-diff selected" data-bm="classic" onclick="selectBloodMode('classic')" ontouchend="event.preventDefault();selectBloodMode('classic')"><span class="num">&#9876;</span><span class="label">经典</span></div>
        <div class="mode-btn ai-diff" data-bm="blood" onclick="selectBloodMode('blood')" ontouchend="event.preventDefault();selectBloodMode('blood')"><span class="num">&#x1F525;</span><span class="label">血战</span></div>
      </div>
      <div id="blood-hint" style="font-size:9px;opacity:.3;margin-top:6px;letter-spacing:1px;display:none">五连清除周围棋子并得分，先到5分获胜</div>
    </div>
    <input class="name-input" id="my-name" placeholder="你的名称" maxlength="8">
    <div class="lobby-actions">
      <button class="lobby-btn primary" onclick="createRoom()" ontouchend="event.preventDefault();createRoom()">创建对局</button>
      <div style="font-size:10px;opacity:.2;margin:1px 0">— 或 —</div>
      <div class="join-row">
        <input class="join-input" id="join-code" placeholder="房间号" maxlength="5" autocomplete="off">
        <button class="join-go" onclick="joinRoom()" ontouchend="event.preventDefault();joinRoom()">加入</button>
      </div>
    </div>
  </div>
</div>

<!-- Room -->
<div id="room-screen">
  <div class="room-box" id="room-box"></div>
</div>

<!-- Game -->
<div id="game">
  <div class="game-wrap">
    <div class="main-col">
      <div class="title">星 虚 对 弈</div>
      <div class="info-bar" id="info-bar"></div>
      <div style="position:relative">
        <canvas id="board-canvas"></canvas>
        <button id="nova-btn" onclick="triggerSupernova()">引爆超新星</button>
      </div>
      <div class="bottom-bar">
        <button class="btn" onclick="requestUndo()">悔棋</button>
        <button class="btn" onclick="requestRestart()">重新开始</button>
        <button class="btn" onclick="leaveRoom()">离开</button>
        <span class="score-text" id="move-count">第 0 手</span>
      </div>
    </div>
    <div class="side-panel" id="side-panel"></div>
  </div>
</div>

<!-- AI Thinking -->
<div id="ai-thinking" style="display:none;position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:55;
  padding:5px 16px;border-radius:20px;background:rgba(12,12,22,.92);border:1px solid rgba(122,95,255,.2);
  font-size:11px;letter-spacing:2px;pointer-events:none;backdrop-filter:blur(4px);
  box-shadow:0 2px 12px rgba(122,95,255,.1)">
  <span style="color:#9b8fff">&#x1F9E0;</span> <span style="color:#7a5fff">思考中</span><span class="thinking-dots">...</span>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="ov-content">
    <h2 id="winner-text"></h2>
    <p id="winner-sub"></p>
    <button class="btn" onclick="requestRestart()">再来一局</button>
  </div>
</div>

<div id="intercept-container"></div>
<div id="undo-container"></div>

<script src="app.js" defer></script>
</body>
</html>
